<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b3b2e" />
<title>Shuk Gift — Wallet</title>
<style>
  :root{
    --bg:#ffffff; --surface:#f5f7f6; --surface2:#eef1f0; --line:#e5e9e7;
    --ink:#0c1512; --muted:#5d6b65; --faint:#93a09a;
    --accent:#0e9f6e; --accent2:#0b8a5f; --ok:#0e9f6e; --okbg:#e7f6ef;
    --card1:#0b3b2e; --card2:#114b39;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:#eef1f0;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;color-scheme:light;}
  button{font-family:inherit;cursor:pointer;} input{font-family:inherit;color-scheme:light;} svg{display:block;}

  /* Auth gate */
  .auth{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(120% 120% at 80% 0%,#15614a 0%,#0c3527 55%,#06231a 100%);padding:24px;z-index:100;}
  .authcard{background:#fff;border-radius:20px;padding:34px 30px;width:100%;max-width:380px;box-shadow:0 30px 70px -30px rgba(0,0,0,.55);text-align:center;}
  .brand{display:inline-flex;align-items:center;gap:10px;font-weight:850;font-size:22px;letter-spacing:-.5px;}
  .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#3fd39a);display:grid;place-items:center;color:#fff;font-weight:850;font-size:15px;}
  .auth p{color:var(--muted);font-size:14px;margin:10px 0 14px;}
  .apills{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:0 0 18px;}
  .apill{font-size:11.5px;font-weight:750;color:var(--accent2);background:var(--okbg);border-radius:999px;padding:5px 11px;display:inline-flex;align-items:center;gap:5px;}
  #clerkSignIn{display:flex;justify-content:center;}

  /* Shell */
  .shell{display:none;min-height:100vh;}
  aside{width:240px;flex:none;background:#fff;border-right:1px solid var(--line);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:22px 16px;}
  aside .brand{padding:4px 8px 6px;font-size:19px;}
  .rolepill{margin:8px 8px 16px;font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--accent2);background:var(--okbg);padding:5px 10px;border-radius:7px;display:inline-block;width:fit-content;}
  aside nav{display:flex;flex-direction:column;gap:3px;}
  aside nav button{display:flex;align-items:center;gap:11px;background:none;border:none;border-radius:11px;padding:11px 12px;font-size:14.5px;font-weight:650;color:var(--muted);text-align:left;}
  aside nav button svg{width:19px;height:19px;stroke:currentColor;flex:none;}
  aside nav button:hover{background:var(--surface);color:var(--ink);}
  aside nav button.on{background:var(--okbg);color:var(--accent2);}
  .spacer{flex:1;}
  .userchip{border-top:1px solid var(--line);padding-top:14px;}
  .userchip .who{display:flex;align-items:center;gap:10px;padding:4px 8px;}
  .av{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:grid;place-items:center;font-weight:800;font-size:13px;color:#3a463f;flex:none;overflow:hidden;}
  .av img{width:100%;height:100%;object-fit:cover;}
  .userchip .nm{font-size:13.5px;font-weight:800;line-height:1.2;}
  .userchip .em{font-size:11.5px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
  .out{margin-top:8px;width:100%;display:flex;align-items:center;gap:9px;background:none;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700;color:var(--muted);}
  .out:hover{background:var(--surface);color:var(--ink);} .out svg{width:16px;height:16px;stroke:currentColor;}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  header.top{position:sticky;top:0;z-index:6;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 32px;display:flex;align-items:center;gap:14px;}
  header.top .title{font-size:19px;font-weight:850;letter-spacing:-.3px;}
  .grow{flex:1;}
  .secure{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);}
  .secure svg{width:15px;height:15px;stroke:var(--accent);}
  .scroll{padding:28px 32px 70px;width:100%;max-width:1080px;}
  .view{animation:f .2s ease;} @keyframes f{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  .grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:22px;align-items:start;}

  .gc{position:relative;border-radius:20px;padding:24px;color:#fff;overflow:hidden;max-width:430px;background:radial-gradient(130% 130% at 100% 0%,#15614a 0%,var(--card2) 45%,var(--card1) 100%);box-shadow:0 20px 44px -22px rgba(12,21,18,.6);}
  .gc .deco{position:absolute;top:-40px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(63,211,154,.18);}
  .gc .r1{display:flex;justify-content:space-between;align-items:center;position:relative;}
  .gc .r1 .nm{font-weight:850;font-size:15px;letter-spacing:.3px;}
  .gc .r1 .tag{font-size:10.5px;font-weight:800;letter-spacing:1.5px;opacity:.7;}
  .gc .lbl{margin-top:26px;font-size:12px;opacity:.72;}
  .gc .bal{font-size:38px;font-weight:850;letter-spacing:-1px;margin-top:2px;}
  .gc .foot{display:flex;justify-content:space-between;margin-top:22px;font-size:11.5px;opacity:.72;letter-spacing:.5px;}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:11px;max-width:430px;margin-top:14px;}
  .act{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;display:flex;align-items:center;gap:11px;color:var(--ink);font-weight:750;font-size:14px;}
  .act:hover{background:var(--surface);} .act .ic{width:34px;height:34px;border-radius:9px;background:var(--okbg);display:grid;place-items:center;} .act .ic svg{width:18px;height:18px;stroke:var(--accent);}

  .block{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;}
  .block h3{margin:0 0 14px;font-size:14px;font-weight:850;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;}
  .stat .k{font-size:12px;color:var(--muted);font-weight:650;} .stat .v{font-size:26px;font-weight:850;letter-spacing:-.5px;margin-top:4px;} .stat.green .v{color:var(--accent);}
  .list{display:flex;flex-direction:column;}
  .row{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--surface);flex:none;} .row .ic svg{width:16px;height:16px;}
  .row .nm{font-size:14px;font-weight:700;} .row .dt{font-size:12px;color:var(--muted);margin-top:1px;}
  .row .amt{margin-left:auto;font-weight:850;font-size:14px;font-variant-numeric:tabular-nums;} .amt.pos{color:var(--accent);} .amt.neg{color:var(--ink);}
  .row .go{margin-left:auto;background:var(--okbg);color:var(--accent2);border:none;border-radius:9px;padding:8px 13px;font-weight:800;font-size:13px;}
  .empty{color:var(--faint);font-size:13px;padding:16px 2px;}
  .tbl{width:100%;border-collapse:collapse;font-size:14px;}
  .tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:800;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;}
  .tbl td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .tbl tr:last-child td{border-bottom:none;}
  .tbl tbody tr:hover td{background:var(--surface);}
  .tnum{font-variant-numeric:tabular-nums;}
  .right{text-align:right;}
  .pill2{display:inline-block;font-size:11px;font-weight:800;padding:3px 9px;border-radius:7px;white-space:nowrap;}
  .pill2.on{background:var(--okbg);color:var(--accent2);} .pill2.off{background:#fdecec;color:#b91c1c;}
  .kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .ministat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px 16px;}
  .ministat .k{font-size:12px;color:var(--muted);font-weight:650;display:flex;align-items:center;gap:7px;}
  .ministat .k svg{width:15px;height:15px;stroke:var(--accent);}
  .ministat .v{font-size:24px;font-weight:850;letter-spacing:-.5px;margin-top:5px;} .ministat.green .v{color:var(--accent);}
  .srow{display:flex;align-items:center;gap:12px;padding:13px 2px;border-bottom:1px solid var(--line);} .srow:last-child{border-bottom:none;}
  .srch{width:100%;padding:10px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;margin-bottom:6px;background:#fff;}
  .srch:focus{outline:none;border-color:var(--accent);}

  .flabel{font-size:12.5px;font-weight:750;color:#3a463f;display:block;margin-top:8px;}
  .fld{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;margin:5px 0 12px;background:#fff;color:var(--ink);}
  .fld:focus{outline:none;border-color:var(--accent);}
  .btn{border:none;border-radius:11px;padding:12px 18px;font-weight:850;font-size:14px;} .btn.pri{background:var(--accent);color:#fff;width:100%;} .btn.pri:hover{background:var(--accent2);} .btn.sub{background:var(--surface);color:var(--ink);border:1px solid var(--line);}
  .note{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:12px;}
  .codebox{font-size:24px;font-weight:850;letter-spacing:5px;text-align:center;background:var(--surface);border:1px dashed #bcd0c8;border-radius:14px;padding:18px;margin-top:6px;font-variant-numeric:tabular-nums;}
  .seg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:6px 0 10px;}
  .seg button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 0;font-weight:750;font-size:14px;color:var(--ink);} .seg button.on{border-color:var(--accent);background:var(--okbg);color:var(--accent2);}

  .backdrop{position:fixed;inset:0;background:rgba(12,21,18,.45);display:none;z-index:50;}
  .sheet{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(420px,92vw);background:#fff;border-radius:18px;padding:24px;box-shadow:0 30px 70px -24px rgba(0,0,0,.55);z-index:51;display:none;}
  .sheet h3{margin:0 0 4px;font-size:18px;font-weight:850;} .sheet .sub{color:var(--muted);font-size:13px;margin:0 0 14px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;max-width:420px;box-shadow:0 16px 34px -10px rgba(0,0,0,.5);display:none;z-index:60;text-align:center;}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;} @keyframes sp{to{transform:rotate(360deg);}}
  .mobnav{display:none;}
  @media(max-width:820px){ aside{display:none;} header.top,.scroll{padding-left:16px;padding-right:16px;} .grid2{grid-template-columns:1fr;} .stats{grid-template-columns:1fr 1fr;} .scroll{padding-bottom:96px;}
    .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:9px 0 14px;z-index:30;}
    .mobnav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--faint);} .mobnav button svg{width:21px;height:21px;stroke:currentColor;} .mobnav button.on{color:var(--accent);} }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth" id="auth" style="display:none">
  <div class="authcard">
    <div class="brand"><span class="mark">S</span><span>Shuk Gift</span></div>
    <p>Your store credit, rewards and linked banks — all in one beautiful wallet.</p>
    <div class="apills"><span class="apill">⚡ Instant rewards</span><span class="apill">🔒 Bank-grade security</span><span class="apill">🎁 Welcome bonus</span></div>
    <div id="clerkSignIn"></div>
  </div>
</div>

<!-- APP -->
<div class="shell" id="shell">
  <aside>
    <div class="brand"><span class="mark">S</span><span>Shuk Gift</span></div>
    <span class="rolepill" id="rolePill">—</span>
    <nav id="nav"></nav>
    <div class="spacer"></div>
    <div class="userchip">
      <div class="who"><div class="av" id="avatar">·</div><div><div class="nm" id="sideName">—</div><div class="em" id="sideEmail">—</div></div></div>
      <button class="out" id="signout"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sign out</button>
    </div>
  </aside>
  <div class="main">
    <header class="top">
      <span class="title" id="pageTitle">Home</span>
      <span class="grow"></span>
      <span class="secure"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>Secured</span>
    </header>
    <div class="scroll" id="scroll"></div>
    <div class="mobnav" id="mobnav"></div>
  </div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="toast" id="toast"></div>

<script>
  const $=id=>document.getElementById(id);
  const fmt=c=>"$"+((c||0)/100).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtCard=n=>n?String(n).replace(/(.{4})(?=.)/g,"$1 "):"•••• •••• •••• ••••";
  const prog=()=>(ME&&ME.program)||{};
  const brand=()=>prog().programName||"Shuk Gift";
  const store=()=>prog().storeName||"Shuk";
  const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const escAttr=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
  function toast(m){const t=$("toast");t.innerHTML=m;t.style.display="block";clearTimeout(t._h);t._h=setTimeout(()=>t.style.display="none",3600);}
  let clerkActive=false, ME=null, page="home", PREVIEW=null, selectedCard=null, txStoreFilter="", verifiedCard=null;

  async function api(action, body){
    const headers={"Content-Type":"application/json"};
    try{ if(clerkActive&&window.Clerk&&Clerk.session){ const t=await Clerk.session.getToken(); if(t) headers.Authorization="Bearer "+t; } }catch(e){}
    const r=await fetch("/api/gift",{method:"POST",headers,body:JSON.stringify(Object.assign({action},body||{}))});
    return r.json();
  }

  /* ---------- Clerk ---------- */
  async function boot(){
    let cfg={}; try{ cfg=await (await fetch("/api/config")).json(); }catch(e){}
    if(cfg&&cfg.clerkPublishableKey){ loadClerk(cfg.clerkPublishableKey); }
    else { $("auth").style.display="grid"; $("clerkSignIn").innerHTML='<p style="color:#b91c1c;font-size:13px">Sign-in isn’t configured yet.</p>'; }
  }
  function loadClerk(pk){
    const s=document.createElement("script");
    s.setAttribute("data-clerk-publishable-key",pk);
    s.src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
    s.async=true; s.crossOrigin="anonymous";
    s.onload=async()=>{ try{ await Clerk.load(); clerkActive=true; Clerk.addListener(()=>gate()); gate(); }catch(e){ $("auth").style.display="grid"; } };
    document.head.appendChild(s);
  }
  async function gate(){
    if(window.Clerk&&Clerk.user){
      $("auth").style.display="none";
      await refresh();
      $("shell").style.display="flex";
    } else {
      $("shell").style.display="none"; $("auth").style.display="grid";
      const c=$("clerkSignIn"); if(!c._m){ c._m=true; try{ Clerk.mountSignIn(c); }catch(e){} }
    }
  }
  $("signout").addEventListener("click",()=>{ if(window.Clerk) Clerk.signOut(); });

  /* ---------- Data ---------- */
  async function refresh(){
    const d=await api("bootstrap");
    ME=d||{};
    const u=window.Clerk&&Clerk.user;
    const name=ME.name||(u&&u.fullName)||(ME.email||"").split("@")[0];
    $("sideName").textContent=name; $("sideEmail").textContent=ME.email||"";
    if(u&&u.imageUrl) $("avatar").innerHTML='<img src="'+u.imageUrl+'">'; else $("avatar").textContent=(name||"·").slice(0,1).toUpperCase();
    $("rolePill").textContent = ME.role==="admin" ? "PLATFORM ADMIN" : ME.role==="store" ? "STORE" : "CUSTOMER";
    if(page==="program" && ME.role!=="admin") page="home";
    if(ME.autoReloaded&&ME.autoReloaded.amount){ toast("Auto top-up: added "+fmt(ME.autoReloaded.amount)+" to your card."); }
    buildNav(); render();
  }

  function buildNav(){
    const gear='<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>';
    const people='<circle cx="9" cy="8" r="3"/><path d="M2.5 20a6.5 6.5 0 0 1 13 0"/><path d="M16 5.2a3 3 0 0 1 0 5.6M22 20a6.5 6.5 0 0 0-4.5-6.2"/>';
    const shop='<path d="M3 9l1.2-5h15.6L21 9M4 9v11h16V9M4 9h16M9.5 20v-6h5v6"/>';
    const act='<path d="M3 12h4l3 8 4-16 3 8h4"/>';
    const cardIc='<rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/>';
    let items;
    if(ME.role==="customer"){
      items=[["home","My card",cardIc],["rewards","Rewards",'<path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4L12 17l-6.3 4.4L8 14 2 9.4h7.6z"/>'],["activity","Activity",act],["settings","Account",'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>']];
    } else if(ME.role==="admin"){
      items=[["home","Overview",'<path d="M3 11l9-7 9 7M5 10v10h14V10"/>'],["stores","Stores",shop],["customers","Customers",people],["cards","Cards",cardIc],["activity","Transactions",act],["program","Settings",gear]];
    } else {
      // Store: charge by card number + see only its own sales. No browsing all cards.
      items=[["home","Dashboard",'<path d="M3 11l9-7 9 7M5 10v10h14V10"/>'],["checkout","Charge",'<rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/><path d="M6 15h4"/>'],["activity","Transactions",act],["settings","Account",'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>']];
    }
    const mk=(id,label,svg,cls)=>'<button class="'+(page===id?cls:"")+'" data-go="'+id+'"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+svg+'</svg>'+label+'</button>';
    $("nav").innerHTML=items.map(i=>mk(i[0],i[1],i[2],"on")).join("");
    $("mobnav").innerHTML=items.map(i=>mk(i[0],i[1],i[2],"on")).join("");
  }
  document.body.addEventListener("click",e=>{ const g=e.target.closest("[data-go]"); if(g){ page=g.getAttribute("data-go"); buildNav(); render(); } });

  /* ---------- Render ---------- */
  const titles={home:ME=>ME.role==="admin"?"Platform overview":ME.role==="store"?"Store dashboard":"My card",checkout:()=>"Charge a card",customers:ME=>ME.role==="admin"?"Customers":"Gift cards",stores:()=>"Stores",cards:()=>"Pre-printed cards",activity:ME=>ME.role!=="customer"?"Transactions":"Activity",preview:()=>"Customer view",rewards:()=>"Rewards",settings:()=>"Account",program:()=>"Program & rewards"};
  function txLabel(t){
    const c=t.cat||"", pos=(t.amount||0)>0;
    if(c.indexOf("ach")>=0) return pos?"Bank transfer":"Bank withdrawal";
    if(c==="account_transfer_intention") return pos?"Credit":"Purchase";
    if(c==="interest_payment") return /redeem/i.test(t.desc||"")?"Points redeemed":"Added funds";
    return pos?"Added funds":"Purchase";
  }
  function actRow(t){
    const pos=(t.amount||0)>0;
    const stroke=pos?"#0e9f6e":"#5d6b65";

  async function drawWallet(){
    const wrap=$("walletList"); if(!wrap) return;
    const st=await api("bankStatus");
    const banks=(st&&st.banks)||[];
    if(!banks.length){ wrap.innerHTML='<div class="empty">No banks linked yet.</div>'; return; }
    wrap.innerHTML=banks.map(b=>'<div class="row"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#0e9f6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V10M19 21V10M3 10l9-6 9 6M9 21v-6h6v6"/></svg></div><div><div class="nm">'+(b.funding==="savings"?"Savings":"Checking")+' •••• '+esc(b.last4||"")+'</div><div class="dt">Routing •••• '+esc(b.routingLast4||"")+'</div></div><button class="go removeBank" data-id="'+escAttr(b.id)+'" style="margin-left:auto;background:#fdecec;color:#b91c1c">Remove</button></div>').join("");
    wrap.querySelectorAll(".removeBank").forEach(btn=>btn.addEventListener("click",async()=>{ btn.disabled=true; btn.innerHTML='<span class="spin"></span>'; const r=await api("removeBank",{bankId:btn.getAttribute("data-id")}); if(r&&r.ok){ toast("Bank removed."); drawWallet(); } else { toast(r&&r.error?r.error:"Could not remove bank."); btn.disabled=false; btn.textContent="Remove"; } }));
  }
  function openAutoReload(){
    const ar=ME.autoReload||{enabled:false,mode:"low",thresholdCents:0,amountCents:0};
    const seg=(m,l)=>'<button data-m="'+m+'"'+(ar.mode===m?' class="on"':'')+'>'+l+'</button>';
    const {el,close}=sheet('<h3>Auto top-up</h3><p class="sub">Reload your card automatically from a linked bank.</p>'+
      '<label style="display:flex;align-items:center;gap:9px;margin:2px 0 12px;font-size:13.5px;font-weight:650;cursor:pointer"><input type="checkbox" id="arOn" '+(ar.enabled?"checked":"")+' /> Enable auto top-up</label>'+
      '<label class="flabel">When to reload</label><div class="seg" id="arMode" style="grid-template-columns:repeat(3,1fr)">'+seg("low","Low bal.")+seg("weekly","Weekly")+seg("monthly","Monthly")+'</div>'+
      '<div id="arThWrap"><label class="flabel">Reload when balance falls below ($)</label><input class="fld" id="arTh" type="number" min="1" step="1" value="'+(ar.thresholdCents?(ar.thresholdCents/100):"")+'" placeholder="e.g. 20" /></div>'+
      '<label class="flabel">Reload amount ($)</label><input class="fld" id="arAmt" type="number" min="1" step="1" value="'+(ar.amountCents?(ar.amountCents/100):"")+'" placeholder="e.g. 50" />'+
      '<button class="btn pri" id="arSave">Save auto top-up</button><button class="btn sub" id="arCx" style="width:100%;margin-top:8px">Cancel</button>'+
      '<p class="note">Requires a linked bank. We pull funds by ACH; transfers take 1–3 business days to settle. The scheduled check runs daily.</p>');
    let mode=ar.mode||"low";
    const syncTh=()=>{ el.querySelector("#arThWrap").style.display=mode==="low"?"block":"none"; };
    el.querySelectorAll("#arMode button").forEach(b=>b.addEventListener("click",()=>{ mode=b.getAttribute("data-m"); el.querySelectorAll("#arMode button").forEach(x=>x.classList.toggle("on",x===b)); syncTh(); }));
    syncTh();
    el.querySelector("#arCx").addEventListener("click",close);
    el.querySelector("#arSave").addEventListener("click",async()=>{
      const enabled=el.querySelector("#arOn").checked;
      const amountCents=Math.round((parseFloat(el.querySelector("#arAmt").value)||0)*100);
      const thresholdCents=Math.round((parseFloat(el.querySelector("#arTh").value)||0)*100);
      const g=el.querySelector("#arSave"); g.disabled=true; g.innerHTML='<span class="spin"></span>';
      const r=await api("setAutoReload",{enabled,mode,amountCents,thresholdCents});
      if(r&&r.ok){ ME.autoReload=r.autoReload; close(); toast(enabled?"Auto top-up saved.":"Auto top-up turned off."); render(); }
      else { toast(r&&r.error?r.error:"Could not save."); g.disabled=false; g.textContent="Save auto top-up"; }
    });
  }
  function openPhoneBanking(){
    const {el,close}=sheet('<h3>Phone &amp; text banking</h3><p class="sub">Bank by calling or texting — check balance, add money, link a bank.</p>'+
      '<label class="flabel">Mobile phone number</label><input class="fld" id="pbPhone" type="tel" inputmode="tel" value="'+escAttr(ME.phone||"")+'" placeholder="(555) 123-4567" />'+

      '<button class="btn pri" id="pbSave">'+(ME.ivrPinSet?"Update phone banking":"Enable phone banking")+'</button>'+
      '<button class="btn sub" id="pbCx" style="width:100%;margin-top:8px">Cancel</button>'+
      '<p class="note">Your PIN is stored securely (hashed) and is required when you call or text. US numbers only. Standard call/message rates may apply.</p>');

      else { toast(r&&r.error?r.error:"Could not save."); g.disabled=false; g.textContent=ME.ivrPinSet?"Update phone banking":"Enable phone banking"; }
    });
  }

  /* ----- Admin: pre-printed, phone-activated cards ----- */
  function csvDownload(rows,filename){
    const csv=rows.map(r=>r.map(c=>{ const s=String(c==null?"":c); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(",")).join("\r\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"}); const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  }

  function renderStoreAccount(s){
    const st=ME.store||{}, stats=ME.stats||{}, bank=st.bank, ap=st.autoPay||{};
    const apLabel = ap.enabled ? (ap.mode==="threshold" ? ("When balance reaches "+fmt(ap.thresholdCents)) : (ap.mode==="daily"?"Every day":"Every week")) : "Off";
    s.innerHTML=
      '<div class="grid2"><div class="block"><h3>Payouts</h3>'+
        '<div class="row" style="border:none;padding-bottom:6px"><div><div class="dt">Available to withdraw</div><div class="nm" style="font-size:22px;color:var(--accent)">'+fmt(stats.owed||0)+'</div></div><button class="btn pri" id="drawBtn" style="width:auto;margin-left:auto;padding:10px 16px">Withdraw</button></div>'+
        '<h3 style="margin-top:8px">Payout bank (ACH)</h3>'+
        (bank
          ? '<div class="row" style="border:none"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="#0e9f6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-6 9 6M4 9v11h16V9M9 20v-6h6v6"/></svg></div><div><div class="nm">Bank account</div><div class="dt">•••• '+esc(bank.last4)+'</div></div><button class="btn sub" id="bankBtn" style="width:auto;margin-left:auto">Change</button></div>'
          : '<button class="btn sub" id="bankBtn" style="width:100%">+ Add a payout bank</button>')+
        '<h3 style="margin-top:14px">Auto-pay</h3>'+
        '<div class="row" style="border:none"><div><div class="nm">'+apLabel+'</div><div class="dt">Automatically send your balance to your bank.</div></div><button class="btn sub" id="autoBtn" style="width:auto;margin-left:auto">Manage</button></div>'+
        '<p class="note">Withdrawals are sent by ACH to your linked bank and usually arrive in 1–3 business days.</p>'+
      '</div><div class="block"><h3>Account</h3>'+
        '<div class="row"><div><div class="dt">Store</div><div class="nm">'+esc(st.name||ME.name||"")+'</div></div></div>'+
        '<div class="row"><div><div class="dt">Login email</div><div class="nm">'+esc(ME.email||"")+'</div></div></div>'+
        '<div class="row" style="border:none"><div><div class="dt">Rates</div><div class="nm">'+(st.rewardsPercent||0)+'% reward · '+(st.feePercent||0)+'% platform fee</div></div></div>'+
        '<button class="btn sub" id="mgBtn" style="width:100%;margin-top:12px">Manage profile &amp; security</button>'+
        '<button class="btn sub" id="soBtn" style="width:100%;margin-top:8px">Sign out</button>'+
      '</div></div>';
    $("drawBtn").addEventListener("click",openPayout);
    $("bankBtn").addEventListener("click",openLinkStoreBank);
    $("autoBtn").addEventListener("click",openStoreAutoPay);
    $("mgBtn").addEventListener("click",()=>{ try{ if(window.Clerk&&Clerk.openUserProfile){ Clerk.openUserProfile(); } else { toast("Unavailable."); } }catch(e){ toast("Unavailable."); } });
    $("soBtn").addEventListener("click",()=>{ if(window.Clerk) Clerk.signOut(); });
  }
  function openLinkStoreBank(){
    const {el,close}=sheet('<h3>Payout bank</h3><p class="sub">Where should we send your payouts?</p><label class="flabel">Routing number</label><input class="fld" id="rt" inputmode="numeric" placeholder="9 digits"/><label class="flabel">Account number</label><input class="fld" id="an" inputmode="numeric" placeholder="Account number"/><label class="flabel">Account type</label><select class="fld" id="ft"><option value="checking">Checking</option><option value="savings">Savings</option></select><button class="btn pri" id="lk">Save bank</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button><p class="note">Your bank details are sent securely to our banking partner and aren’t stored in the app.</p>');
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#lk").addEventListener("click",async()=>{ const routingNumber=(el.querySelector("#rt").value||"").trim(); const accountNumber=(el.querySelector("#an").value||"").trim(); const funding=el.querySelector("#ft").value; if(routingNumber.replace(/\D/g,"").length!==9){toast("Enter a valid 9-digit routing number.");return;} if(accountNumber.replace(/\D/g,"").length<4){toast("Enter a valid account number.");return;} const g=el.querySelector("#lk"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("linkStoreBank",{routingNumber,accountNumber,funding}); if(r&&r.ok){ close(); toast("Payout bank saved •••• "+(r.last4||"")); await refresh(); render(); } else { toast(r&&r.error?r.error:"Could not save bank."); g.disabled=false; g.textContent="Save bank"; } });
  }
  function openPayout(){
    const owed=(ME.stats&&ME.stats.owed)||0;
    if(!(ME.store&&ME.store.bank)){ openLinkStoreBank(); return; }
    if(owed<=0){ toast("Nothing to withdraw yet."); return; }
    const {el,close}=sheet('<h3>Withdraw</h3><p class="sub">Send your balance to bank •••• '+esc(ME.store.bank.last4)+'.</p><label class="flabel">Amount</label><input class="fld" id="amt" type="number" min="0" step="0.01" value="'+(owed/100).toFixed(2)+'"/><div class="note" style="margin:0 0 10px">Available '+fmt(owed)+'</div><button class="btn pri" id="go">Withdraw</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button>');
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#go").addEventListener("click",async()=>{ const amt=Math.round(parseFloat(el.querySelector("#amt").value)*100); if(!amt||amt<=0){toast("Enter an amount.");return;} if(amt>owed){toast("Max "+fmt(owed)+".");return;} const g=el.querySelector("#go"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("storePayout",{amount:amt}); if(r&&r.ok){ close(); toast("Withdrew "+fmt(Math.round(r.paid*100))+" to your bank."); await refresh(); render(); } else { toast(r&&r.error?r.error:"Could not withdraw."); g.disabled=false; g.textContent="Withdraw"; } });
  }
  function openStoreAutoPay(){
    const ap=(ME.store&&ME.store.autoPay)||{};
    const {el,close}=sheet('<h3>Auto-pay</h3><p class="sub">Automatically send your balance to your bank.</p>'+
      '<label style="display:flex;align-items:center;gap:9px;margin:2px 0 12px;font-weight:650;cursor:pointer"><input type="checkbox" id="apEn" '+(ap.enabled?"checked":"")+'/> Enable auto-pay</label>'+
      '<label class="flabel">Schedule</label><select class="fld" id="apMode"><option value="weekly"'+(ap.mode==="weekly"?" selected":"")+'>Every week</option><option value="daily"'+(ap.mode==="daily"?" selected":"")+'>Every day</option><option value="threshold"'+(ap.mode==="threshold"?" selected":"")+'>When balance reaches an amount</option></select>'+
      '<div id="apThrWrap" style="display:none"><label class="flabel">Pay out when balance reaches ($)</label><input class="fld" id="apThr" type="number" min="0" step="1" value="'+(ap.thresholdCents?(ap.thresholdCents/100):"")+'"/></div>'+
      '<button class="btn pri" id="apSave">Save</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button>'+
      '<p class="note">Requires a linked payout bank. Auto-pay runs automatically when due.</p>');
    const sync=()=>{ el.querySelector("#apThrWrap").style.display = el.querySelector("#apMode").value==="threshold"?"block":"none"; };
    el.querySelector("#apMode").addEventListener("change",sync); sync();
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#apSave").addEventListener("click",async()=>{ const autoPay={ enabled:el.querySelector("#apEn").checked, mode:el.querySelector("#apMode").value, thresholdCents:Math.round((parseFloat(el.querySelector("#apThr").value)||0)*100) }; if(autoPay.enabled && !(ME.store&&ME.store.bank)){ toast("Add a payout bank first."); return; } const g=el.querySelector("#apSave"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("setStorePayout",{autoPay}); if(r&&r.ok){ close(); toast("Auto-pay "+(autoPay.enabled?"on":"off")+"."); await refresh(); render(); } else { toast(r&&r.error?r.error:"Could not save."); g.disabled=false; g.textContent="Save"; } });
  }

  /* ----- Merchant: Program & rewards settings ----- */
  function renderProgram(s){
    const p=ME.program||{};
    const d=c=>((c||0)/100);
    s.innerHTML=
      '<div class="grid2"><div class="block"><h3>Branding</h3>'+
        '<label class="flabel">Store name</label><input class="fld" id="pStore" value="'+(p.storeName||"")+'" />'+
        '<label class="flabel">Card / program name</label><input class="fld" id="pProg" value="'+(p.programName||"")+'" />'+
        '<h3 style="margin-top:10px">Rewards</h3>'+
        '<label class="flabel">Rewards rate — % back as points</label><input class="fld" id="pRew" type="number" min="0" max="25" step="0.5" value="'+(p.rewardsPercent||0)+'" />'+
        '<label class="flabel">Minimum points to redeem</label><input class="fld" id="pMin" type="number" min="1" step="50" value="'+(p.redeemMinPoints||100)+'" />'+
        '<p class="note">Points are worth 1¢ each — 100 points = $1.00. A 5% rate gives a customer 5 points per $1 spent.</p>'+
      '</div><div class="block"><h3>First-load bonus</h3>'+
        '<label class="flabel">Bonus on first load (%)</label><input class="fld" id="pFlb" type="number" min="0" max="50" step="1" value="'+(p.firstLoadBonusPercent||0)+'" />'+
        '<label class="flabel">Bonus cap ($)</label><input class="fld" id="pCap" type="number" min="0" step="1" value="'+d(p.firstLoadBonusCapCents)+'" />'+
        '<label class="flabel">Minimum first load to qualify ($)</label><input class="fld" id="pFmin" type="number" min="0" step="1" value="'+d(p.firstLoadMinCents)+'" />'+
        '<h3 style="margin-top:10px">Signup bonus</h3>'+
        '<label class="flabel">Points granted once at signup</label><input class="fld" id="pSignup" type="number" min="0" step="50" value="'+(p.signupBonusPoints||0)+'" />'+
        '<div class="block" id="pPrev" style="background:var(--okbg);border:none;margin-top:14px;font-size:13px;color:var(--accent2);font-weight:650"></div>'+
        '<button class="btn pri" id="pSave" style="margin-top:12px">Save settings</button></div></div>';
    const preview=()=>{ const rew=parseFloat($("pRew").value)||0, flb=parseFloat($("pFlb").value)||0, cap=parseFloat($("pCap").value)||0, min=parseFloat($("pFmin").value)||0; $("pPrev").innerHTML="Customers see: <b>"+rew+"% back</b>"+(flb>0?(" · <b>"+flb+"%</b> on a first load of $"+min+"+"+(cap>0?(" (up to $"+cap+")"):"")):""); };
    ["pRew","pFlb","pCap","pFmin"].forEach(id=>$(id).addEventListener("input",preview)); preview();
    $("pSave").addEventListener("click",async()=>{
      const program={ storeName:$("pStore").value, programName:$("pProg").value, rewardsPercent:parseFloat($("pRew").value)||0, redeemMinPoints:parseInt($("pMin").value)||100, firstLoadBonusPercent:parseFloat($("pFlb").value)||0, firstLoadBonusCapCents:Math.round((parseFloat($("pCap").value)||0)*100), firstLoadMinCents:Math.round((parseFloat($("pFmin").value)||0)*100), signupBonusPoints:parseInt($("pSignup").value)||0 };
      const g=$("pSave"); g.disabled=true; g.innerHTML='<span class="spin"></span>';
      const r=await api("setProgram",{program});
      if(r&&r.ok){ ME.program=r.program; toast("Settings saved."); render(); } else { toast(r&&r.error?r.error:"Could not save."); g.disabled=false; g.textContent="Save settings"; }
    });
  }

  /* ---------- Sheets ---------- */
  function sheet(html){ const w=document.createElement("div"); w.className="sheet"; w.style.display="block"; w.innerHTML=html; document.body.appendChild(w); $("backdrop").style.display="block"; const close=()=>{w.remove();$("backdrop").style.display="none";}; $("backdrop").onclick=close; return {el:w,close}; }
  async function openAdd(){
    const st=await api("bankStatus");
    if(!st||!st.linked){ openLinkBank(); return; }
    const {el,close}=sheet('<h3>Add funds</h3><p class="sub">Transfer from your linked bank •••• '+(st.last4||"")+' by ACH.</p><div class="seg" id="q"><button data-q="25">$25</button><button data-q="50">$50</button><button data-q="100">$100</button><button data-q="200">$200</button></div><input class="fld" id="amt" type="number" min="1" step="1" placeholder="Or enter amount" /><button class="btn pri" id="go">Transfer to my card</button><button class="btn sub" id="relink" style="width:100%;margin-top:8px">Use a different bank</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button><p class="note">Funds are pulled from your bank by ACH and added to your store credit. Bank transfers normally take 1–3 business days to settle.</p>');
    el.querySelectorAll("#q button").forEach(b=>b.addEventListener("click",()=>{el.querySelector("#amt").value=b.getAttribute("data-q");el.querySelectorAll("#q button").forEach(x=>x.classList.toggle("on",x===b));}));
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#relink").addEventListener("click",()=>{ close(); openLinkBank(); });
    el.querySelector("#go").addEventListener("click",async()=>{ const amt=Math.round(parseFloat(el.querySelector("#amt").value)*100); if(!amt||amt<=0){toast("Enter an amount.");return;} if(amt>200000){toast("Max $2,000 per transfer.");return;} const g=el.querySelector("#go"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("addFundsAch",{amount:amt}); if(r&&r.ok){ close(); let m=r.settled?("Added "+fmt(amt)+" to your card."):("Transfer of "+fmt(amt)+" started — arrives when it settles."); if(r.bonus>0) m+=" Welcome bonus +"+fmt(r.bonus)+"!"; toast(m); await refresh(); } else { toast(r&&r.error?r.error:"Could not start transfer."); g.disabled=false; g.textContent="Transfer to my card"; } });
  }
  function openLinkBank(){
    const {el,close}=sheet('<h3>Link your bank</h3><p class="sub">Add a bank account to load funds by ACH.</p><label class="flabel">Routing number</label><input class="fld" id="rt" inputmode="numeric" placeholder="9 digits" /><label class="flabel">Account number</label><input class="fld" id="an" inputmode="numeric" placeholder="Account number" /><label class="flabel">Account type</label><select class="fld" id="ft"><option value="checking">Checking</option><option value="savings">Savings</option></select><button class="btn pri" id="lk">Link bank</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button><p class="note">Your bank details are sent securely to our banking partner to enable ACH transfers, and are not stored in the app.</p>');
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#lk").addEventListener("click",async()=>{ const routingNumber=(el.querySelector("#rt").value||"").trim(); const accountNumber=(el.querySelector("#an").value||"").trim(); const funding=el.querySelector("#ft").value; if(routingNumber.replace(/\D/g,"").length!==9){toast("Enter a valid 9-digit routing number.");return;} if(accountNumber.replace(/\D/g,"").length<4){toast("Enter a valid account number.");return;} const g=el.querySelector("#lk"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("linkBank",{routingNumber,accountNumber,funding}); if(r&&r.ok){ close(); toast("Bank linked •••• "+(r.last4||"")); openAdd(); } else { toast(r&&r.error?r.error:"Could not link bank."); g.disabled=false; g.textContent="Link bank"; } });
  }
  function openPay(){
    const {el,close}=sheet('<h3>Pay in store</h3><p class="sub">Show this card number at the register.</p><div class="codebox" style="letter-spacing:2px;font-size:20px">'+fmtCard(ME.cardNumber)+'</div><p class="note" style="text-align:center">Balance '+fmt(ME.balance)+'</p><button class="btn sub" id="cx" style="width:100%;margin-top:10px">Done</button>');
    el.querySelector("#cx").addEventListener("click",close);
  }
  function openCharge(id,email){
    const {el,close}=sheet('<h3>Charge card</h3><p class="sub">'+email+'</p><label class="flabel">Amount of sale</label><input class="fld" id="amt" type="number" min="0" step="0.01" placeholder="0.00" /><button class="btn pri" id="go">Charge</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button>');
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#go").addEventListener("click",async()=>{ const amt=Math.round(parseFloat(el.querySelector("#amt").value)*100); if(!amt||amt<=0){toast("Enter a sale amount.");return;} const g=el.querySelector("#go"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("charge",{cardId:id,amount:amt}); if(r&&r.ok){ close(); toast("Charged "+fmt(amt)+"."); await refresh(); } else { toast(r&&r.error?r.error:"Charge failed."); g.disabled=false; g.textContent="Charge"; } });
  }

  function openIssue(){
    const {el,close}=sheet('<h3>Issue / load a card</h3><p class="sub">Create or top up a customer gift card.</p><label class="flabel">Customer email</label><input class="fld" id="iem" type="email" placeholder="customer@email.com" /><label class="flabel">Load amount</label><div class="seg" id="iq"><button data-q="25">$25</button><button data-q="50">$50</button><button data-q="100">$100</button><button data-q="200">$200</button></div><input class="fld" id="iamt" type="number" min="0" step="1" placeholder="Amount" /><button class="btn pri" id="igo">Issue card</button><button class="btn sub" id="icx" style="width:100%;margin-top:8px">Cancel</button>');
    el.querySelectorAll("#iq button").forEach(b=>b.addEventListener("click",()=>{el.querySelector("#iamt").value=b.getAttribute("data-q");el.querySelectorAll("#iq button").forEach(x=>x.classList.toggle("on",x===b));}));
    el.querySelector("#icx").addEventListener("click",close);
    el.querySelector("#igo").addEventListener("click",async()=>{ const email=(el.querySelector("#iem").value||"").trim(); const amt=Math.round(parseFloat(el.querySelector("#iamt").value||"0")*100); if(!/.+@.+\..+/.test(email)){toast("Enter a valid email.");return;} const g=el.querySelector("#igo"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("issueCard",{email,amount:amt}); if(r&&r.ok){ close(); toast("Card issued for "+email+" — balance "+fmt(r.balance)); await refresh(); } else { toast(r&&r.error?r.error:"Could not issue card."); g.disabled=false; g.textContent="Issue card"; } });
  }

  /* ---------- Store charge (by card number) ---------- */
  async function doVerify(){
    const num=($("coNum").value||"").trim(); if(num.replace(/\D/g,"").length<8){ toast("Enter the gift card number."); return; }
    const b=$("coVerify"); b.disabled=true; b.innerHTML='<span class="spin"></span>';
    const r=await api("verifyCard",{cardNumber:num});
    if(r&&r.ok){ verifiedCard={number:num,last4:r.last4,balance:r.balance,cardId:r.cardId}; render(); }
    else { toast(r&&r.error?r.error:"No card found with that number."); b.disabled=false; b.textContent="Verify card"; }
  }
  async function doAmountCharge(){
    if(!verifiedCard){ toast("Verify a card first."); return; }
    const amt=Math.round(parseFloat($("coAmt").value)*100); if(!amt||amt<=0){ toast("Enter a sale amount."); return; }
    if(amt>verifiedCard.balance){ toast("Card balance is only "+fmt(verifiedCard.balance)+"."); return; }
    const btn=$("coCharge"); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
    const r=await api("checkout",{cardNumber:verifiedCard.number,amount:amt});
    if(r&&r.ok){
      verifiedCard=null;
      let msg="Charged "+fmt(Math.round(r.total*100))+" · "+(r.pointsAwarded||0)+" pts";
      if(r.fee>0) msg+=" · "+fmt(Math.round(r.fee*100))+" fee, "+fmt(Math.round(r.net*100))+" to you";
      msg += r.posInvoice ? " · POS ✓" : (r.posError ? " · POS not synced" : "");
      toast(msg); await refresh(); page="activity"; buildNav(); render();
    } else { toast(r&&r.error?r.error:"Charge failed."); btn.disabled=false; btn.textContent="Charge gift card"; }
  }

  boot();
</script>
</body>
</html>
