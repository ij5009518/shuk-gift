<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shuk Gift</title>
<style>
  :root{
    --bg:#ffffff; --surface:#f5f7f6; --surface2:#eef1f0; --line:#e5e9e7;
    --ink:#0c1512; --muted:#5d6b65; --faint:#93a09a;
    --accent:#0e9f6e; --accent2:#0b8a5f; --ok:#0e9f6e; --okbg:#e7f6ef;
    --card1:#0b3b2e; --card2:#114b39;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:#eef1f0;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;color-scheme:light;}
  button{font-family:inherit;cursor:pointer;} input{font-family:inherit;color-scheme:light;} svg{display:block;}

  /* Auth gate */
  .auth{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(120% 120% at 80% 0%,#15614a 0%,#0c3527 55%,#06231a 100%);padding:24px;z-index:100;}
  .authcard{background:#fff;border-radius:20px;padding:34px 30px;width:100%;max-width:380px;box-shadow:0 30px 70px -30px rgba(0,0,0,.55);text-align:center;}
  .brand{display:inline-flex;align-items:center;gap:10px;font-weight:850;font-size:22px;letter-spacing:-.5px;}
  .mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#3fd39a);display:grid;place-items:center;color:#fff;font-weight:850;font-size:15px;}
  .auth p{color:var(--muted);font-size:14px;margin:10px 0 20px;}
  #clerkSignIn{display:flex;justify-content:center;}

  /* Shell */
  .shell{display:none;min-height:100vh;}
  aside{width:240px;flex:none;background:#fff;border-right:1px solid var(--line);position:sticky;top:0;height:100vh;display:flex;flex-direction:column;padding:22px 16px;}
  aside .brand{padding:4px 8px 6px;font-size:19px;}
  .rolepill{margin:8px 8px 16px;font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--accent2);background:var(--okbg);padding:5px 10px;border-radius:7px;display:inline-block;width:fit-content;}
  aside nav{display:flex;flex-direction:column;gap:3px;}
  aside nav button{display:flex;align-items:center;gap:11px;background:none;border:none;border-radius:11px;padding:11px 12px;font-size:14.5px;font-weight:650;color:var(--muted);text-align:left;}
  aside nav button svg{width:19px;height:19px;stroke:currentColor;flex:none;}
  aside nav button:hover{background:var(--surface);color:var(--ink);}
  aside nav button.on{background:var(--okbg);color:var(--accent2);}
  .spacer{flex:1;}
  .userchip{border-top:1px solid var(--line);padding-top:14px;}
  .userchip .who{display:flex;align-items:center;gap:10px;padding:4px 8px;}
  .av{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:grid;place-items:center;font-weight:800;font-size:13px;color:#3a463f;flex:none;overflow:hidden;}
  .av img{width:100%;height:100%;object-fit:cover;}
  .userchip .nm{font-size:13.5px;font-weight:800;line-height:1.2;}
  .userchip .em{font-size:11.5px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
  .out{margin-top:8px;width:100%;display:flex;align-items:center;gap:9px;background:none;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:13px;font-weight:700;color:var(--muted);}
  .out:hover{background:var(--surface);color:var(--ink);} .out svg{width:16px;height:16px;stroke:currentColor;}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  header.top{position:sticky;top:0;z-index:6;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 32px;display:flex;align-items:center;gap:14px;}
  header.top .title{font-size:19px;font-weight:850;letter-spacing:-.3px;}
  .grow{flex:1;}
  .secure{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);}
  .secure svg{width:15px;height:15px;stroke:var(--accent);}
  .scroll{padding:28px 32px 70px;width:100%;max-width:1080px;}
  .view{animation:f .2s ease;} @keyframes f{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
  .grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:22px;align-items:start;}

  .gc{position:relative;border-radius:20px;padding:24px;color:#fff;overflow:hidden;max-width:430px;background:radial-gradient(130% 130% at 100% 0%,#15614a 0%,var(--card2) 45%,var(--card1) 100%);box-shadow:0 20px 44px -22px rgba(12,21,18,.6);}
  .gc .deco{position:absolute;top:-40px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(63,211,154,.18);}
  .gc .r1{display:flex;justify-content:space-between;align-items:center;position:relative;}
  .gc .r1 .nm{font-weight:850;font-size:15px;letter-spacing:.3px;}
  .gc .r1 .tag{font-size:10.5px;font-weight:800;letter-spacing:1.5px;opacity:.7;}
  .gc .lbl{margin-top:26px;font-size:12px;opacity:.72;}
  .gc .bal{font-size:38px;font-weight:850;letter-spacing:-1px;margin-top:2px;}
  .gc .foot{display:flex;justify-content:space-between;margin-top:22px;font-size:11.5px;opacity:.72;letter-spacing:.5px;}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:11px;max-width:430px;margin-top:14px;}
  .act{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;display:flex;align-items:center;gap:11px;color:var(--ink);font-weight:750;font-size:14px;}
  .act:hover{background:var(--surface);} .act .ic{width:34px;height:34px;border-radius:9px;background:var(--okbg);display:grid;place-items:center;} .act .ic svg{width:18px;height:18px;stroke:var(--accent);}

  .block{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;}
  .block h3{margin:0 0 14px;font-size:14px;font-weight:850;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;}
  .stat .k{font-size:12px;color:var(--muted);font-weight:650;} .stat .v{font-size:26px;font-weight:850;letter-spacing:-.5px;margin-top:4px;} .stat.green .v{color:var(--accent);}
  .list{display:flex;flex-direction:column;}
  .row{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--surface);flex:none;} .row .ic svg{width:16px;height:16px;}
  .row .nm{font-size:14px;font-weight:700;} .row .dt{font-size:12px;color:var(--muted);margin-top:1px;}
  .row .amt{margin-left:auto;font-weight:850;font-size:14px;font-variant-numeric:tabular-nums;} .amt.pos{color:var(--accent);} .amt.neg{color:var(--ink);}
  .row .go{margin-left:auto;background:var(--okbg);color:var(--accent2);border:none;border-radius:9px;padding:8px 13px;font-weight:800;font-size:13px;}
  .empty{color:var(--faint);font-size:13px;padding:16px 2px;}

  .flabel{font-size:12.5px;font-weight:750;color:#3a463f;display:block;margin-top:8px;}
  .fld{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:14px;margin:5px 0 12px;background:#fff;color:var(--ink);}
  .fld:focus{outline:none;border-color:var(--accent);}
  .btn{border:none;border-radius:11px;padding:12px 18px;font-weight:850;font-size:14px;} .btn.pri{background:var(--accent);color:#fff;width:100%;} .btn.pri:hover{background:var(--accent2);} .btn.sub{background:var(--surface);color:var(--ink);border:1px solid var(--line);}
  .note{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:12px;}
  .codebox{font-size:24px;font-weight:850;letter-spacing:5px;text-align:center;background:var(--surface);border:1px dashed #bcd0c8;border-radius:14px;padding:18px;margin-top:6px;font-variant-numeric:tabular-nums;}
  .seg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:6px 0 10px;}
  .seg button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 0;font-weight:750;font-size:14px;color:var(--ink);} .seg button.on{border-color:var(--accent);background:var(--okbg);color:var(--accent2);}

  .backdrop{position:fixed;inset:0;background:rgba(12,21,18,.45);display:none;z-index:50;}
  .sheet{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(420px,92vw);background:#fff;border-radius:18px;padding:24px;box-shadow:0 30px 70px -24px rgba(0,0,0,.55);z-index:51;display:none;}
  .sheet h3{margin:0 0 4px;font-size:18px;font-weight:850;} .sheet .sub{color:var(--muted);font-size:13px;margin:0 0 14px;}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;max-width:420px;box-shadow:0 16px 34px -10px rgba(0,0,0,.5);display:none;z-index:60;text-align:center;}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;} @keyframes sp{to{transform:rotate(360deg);}}
  .mobnav{display:none;}
  @media(max-width:820px){ aside{display:none;} header.top,.scroll{padding-left:16px;padding-right:16px;} .grid2{grid-template-columns:1fr;} .stats{grid-template-columns:1fr 1fr;} .scroll{padding-bottom:96px;}
    .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:9px 0 14px;z-index:30;}
    .mobnav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--faint);} .mobnav button svg{width:21px;height:21px;stroke:currentColor;} .mobnav button.on{color:var(--accent);} }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth" id="auth" style="display:none">
  <div class="authcard">
    <div class="brand"><span class="mark">S</span><span>Shuk Gift</span></div>
    <p>Sign in to manage your store credit.</p>
    <div id="clerkSignIn"></div>
  </div>
</div>

<!-- APP -->
<div class="shell" id="shell">
  <aside>
    <div class="brand"><span class="mark">S</span><span>Shuk Gift</span></div>
    <span class="rolepill" id="rolePill">—</span>
    <nav id="nav"></nav>
    <div class="spacer"></div>
    <div class="userchip">
      <div class="who"><div class="av" id="avatar">·</div><div><div class="nm" id="sideName">—</div><div class="em" id="sideEmail">—</div></div></div>
      <button class="out" id="signout"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sign out</button>
    </div>
  </aside>
  <div class="main">
    <header class="top">
      <span class="title" id="pageTitle">Home</span>
      <span class="grow"></span>
      <span class="secure"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>Secured</span>
    </header>
    <div class="scroll" id="scroll"></div>
    <div class="mobnav" id="mobnav"></div>
  </div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="toast" id="toast"></div>

<script>
  const $=id=>document.getElementById(id);
  const fmt=c=>"$"+((c||0)/100).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtCard=n=>n?String(n).replace(/(.{4})(?=.)/g,"$1 "):"•••• •••• •••• ••••";
  const prog=()=>(ME&&ME.program)||{};
  const brand=()=>prog().programName||"Shuk Gift";
  const store=()=>prog().storeName||"Shuk";
  function toast(m){const t=$("toast");t.innerHTML=m;t.style.display="block";clearTimeout(t._h);t._h=setTimeout(()=>t.style.display="none",3600);}
  let clerkActive=false, ME=null, page="home", PREVIEW=null, selectedCard=null;

  async function api(action, body){
    const headers={"Content-Type":"application/json"};
    try{ if(clerkActive&&window.Clerk&&Clerk.session){ const t=await Clerk.session.getToken(); if(t) headers.Authorization="Bearer "+t; } }catch(e){}
    const r=await fetch("/api/gift",{method:"POST",headers,body:JSON.stringify(Object.assign({action},body||{}))});
    return r.json();
  }

  /* ---------- Clerk ---------- */
  async function boot(){
    let cfg={}; try{ cfg=await (await fetch("/api/config")).json(); }catch(e){}
    if(cfg&&cfg.clerkPublishableKey){ loadClerk(cfg.clerkPublishableKey); }
    else { $("auth").style.display="grid"; $("clerkSignIn").innerHTML='<p style="color:#b91c1c;font-size:13px">Sign-in isn’t configured yet.</p>'; }
  }
  function loadClerk(pk){
    const s=document.createElement("script");
    s.setAttribute("data-clerk-publishable-key",pk);
    s.src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
    s.async=true; s.crossOrigin="anonymous";
    s.onload=async()=>{ try{ await Clerk.load(); clerkActive=true; Clerk.addListener(()=>gate()); gate(); }catch(e){ $("auth").style.display="grid"; } };
    document.head.appendChild(s);
  }
  async function gate(){
    if(window.Clerk&&Clerk.user){
      $("auth").style.display="none";
      await refresh();
      $("shell").style.display="flex";
    } else {
      $("shell").style.display="none"; $("auth").style.display="grid";
      const c=$("clerkSignIn"); if(!c._m){ c._m=true; try{ Clerk.mountSignIn(c); }catch(e){} }
    }
  }
  $("signout").addEventListener("click",()=>{ if(window.Clerk) Clerk.signOut(); });

  /* ---------- Data ---------- */
  async function refresh(){
    const d=await api("bootstrap");
    ME=d||{};
    const u=window.Clerk&&Clerk.user;
    const name=ME.name||(u&&u.fullName)||(ME.email||"").split("@")[0];
    $("sideName").textContent=name; $("sideEmail").textContent=ME.email||"";
    if(u&&u.imageUrl) $("avatar").innerHTML='<img src="'+u.imageUrl+'">'; else $("avatar").textContent=(name||"·").slice(0,1).toUpperCase();
    $("rolePill").textContent = ME.role==="admin" ? "PLATFORM ADMIN" : ME.role==="store" ? "STORE" : "CUSTOMER";
    if(page==="program" && ME.role!=="admin") page="home";
    buildNav(); render();
  }

  function buildNav(){
    const gear='<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>';
    let items;
    if(ME.role==="customer"){
      items=[["home","My card",'<rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/>'],["rewards","Rewards",'<path d="M12 2l2.4 7.4H22l-6 4.6 2.3 7.4L12 17l-6.3 4.4L8 14 2 9.4h7.6z"/>'],["activity","Activity",'<path d="M3 12h4l3 8 4-16 3 8h4"/>'],["settings","Account",'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>']];
    } else {
      // store + admin share the operations nav; admin also gets Settings.
      items=[["home","Dashboard",'<path d="M3 11l9-7 9 7M5 10v10h14V10"/>'],["checkout","Charge",'<rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/><path d="M6 15h4"/>'],["customers","Cards",'<rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20"/>'],["activity","Transactions",'<path d="M3 12h4l3 8 4-16 3 8h4"/>']];
      if(ME.role==="admin") items.push(["program","Settings",gear]);
    }
    const mk=(id,label,svg,cls)=>'<button class="'+(page===id?cls:"")+'" data-go="'+id+'"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+svg+'</svg>'+label+'</button>';
    $("nav").innerHTML=items.map(i=>mk(i[0],i[1],i[2],"on")).join("");
    $("mobnav").innerHTML=items.map(i=>mk(i[0],i[1],i[2],"on")).join("");
  }
  document.body.addEventListener("click",e=>{ const g=e.target.closest("[data-go]"); if(g){ page=g.getAttribute("data-go"); buildNav(); render(); } });

  /* ---------- Render ---------- */
  const titles={home:ME=>ME.role==="admin"?"Platform overview":ME.role==="store"?"Store dashboard":"My card",checkout:()=>"Charge a card",customers:()=>"Gift cards",activity:ME=>ME.role!=="customer"?"Transactions":"Activity",preview:()=>"Customer view",rewards:()=>"Rewards",settings:()=>"Account",program:()=>"Program & rewards"};
  function txLabel(t){
    const c=t.cat||"", pos=(t.amount||0)>0;
    if(c.indexOf("ach")>=0) return pos?"Bank transfer":"Bank withdrawal";
    if(c==="account_transfer_intention") return pos?"Credit":"Purchase";
    if(c==="interest_payment") return /redeem/i.test(t.desc||"")?"Points redeemed":"Added funds";
    return pos?"Added funds":"Purchase";
  }
  function actRow(t){
    const pos=(t.amount||0)>0;
    const stroke=pos?"#0e9f6e":"#5d6b65";
    const path=pos?'<path d="M12 5v14M5 12l7 7 7-7"/>':'<path d="M12 19V5M5 12l7-7 7 7"/>';
    const label=txLabel(t);
    return '<div class="row"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="'+stroke+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+path+'</svg></div><div><div class="nm">'+label+'</div><div class="dt">'+(t.when||"")+'</div></div><div class="amt '+(pos?"pos":"neg")+'">'+(pos?"+":"−")+fmt(Math.abs(t.amount))+'</div></div>';
  }
  function merchRow(t){
    const sale=(t.amount||0)<0;
    const stroke=sale?"#5d6b65":"#0e9f6e";
    const path=sale?'<path d="M12 19V5M5 12l7-7 7 7"/>':'<path d="M12 5v14M5 12l7 7 7-7"/>';
    const label=t.who||(sale?"Sale":"Load");
    return '<div class="row"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="'+stroke+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+path+'</svg></div><div><div class="nm">'+label+(t.email?' · '+t.email:'')+'</div><div class="dt">'+(t.when||"")+'</div></div><div class="amt '+(sale?"neg":"pos")+'">'+(sale?"−":"+")+fmt(Math.abs(t.amount))+'</div></div>';
  }
  function render(){
    $("pageTitle").textContent=(titles[page]||(()=>"Shuk Gift"))(ME);
    const s=$("scroll");
    if(ME.role!=="customer") return renderMerchant(s);
    return renderCustomer(s);
  }

  /* ----- Customer ----- */
  function renderCustomer(s){
    const txns=ME.transactions||[];
    if(page==="activity"){
      s.innerHTML='<div class="block"><h3>Activity</h3><div class="list">'+(txns.length?txns.map(actRow).join(""):'<div class="empty">No activity yet.</div>')+'</div></div>';
      return;
    }
    if(page==="rewards"){ renderRewards(s); return; }
    if(page==="settings"){ renderSettings(s); return; }
    const p=prog();
    let banner="";
    if(!ME.firstLoadBonusUsed && p.firstLoadBonusPercent>0){
      const min=(p.firstLoadMinCents||0)/100, cap=(p.firstLoadBonusCapCents||0)/100;
      banner='<div class="block" style="margin-bottom:18px;background:linear-gradient(120deg,#0e9f6e,#0b8a5f);color:#fff;border:none"><div style="display:flex;align-items:center;gap:13px"><div style="width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.18);display:grid;place-items:center;flex:none"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M12 8v13M3 12h18"/><path d="M12 8C12 5 10 3 8 4s0 4 4 4zM12 8c0-3 2-5 4-4s0 4-4 4z"/></svg></div><div><div style="font-weight:850;font-size:15px">Welcome bonus</div><div style="font-size:13px;opacity:.94">Load $'+min+'+ and get '+p.firstLoadBonusPercent+'% extra free on your first load'+(cap>0?(" (up to $"+cap+")"):"")+'.</div></div></div></div>';
    }
    s.innerHTML= banner+

    el.querySelectorAll("#q button").forEach(b=>b.addEventListener("click",()=>{el.querySelector("#amt").value=b.getAttribute("data-q");el.querySelectorAll("#q button").forEach(x=>x.classList.toggle("on",x===b));}));

  }
  function openLinkBank(){
    const {el,close}=sheet('<h3>Link your bank</h3><p class="sub">Add a bank account to load funds by ACH.</p><label class="flabel">Routing number</label><input class="fld" id="rt" inputmode="numeric" placeholder="9 digits" /><label class="flabel">Account number</label><input class="fld" id="an" inputmode="numeric" placeholder="Account number" /><label class="flabel">Account type</label><select class="fld" id="ft"><option value="checking">Checking</option><option value="savings">Savings</option></select><button class="btn pri" id="lk">Link bank</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button><p class="note">Your bank details are sent securely to our banking partner to enable ACH transfers, and are not stored in the app.</p>');

    const {el,close}=sheet('<h3>Phone &amp; text banking</h3><p class="sub">Register your mobile number and a 4-digit PIN. You can then call or text to hear your balance and add money.</p><label class="flabel">Mobile number</label><input class="fld" id="ivp" inputmode="tel" placeholder="(555) 555-5555" value="'+(ME.phone||"")+'" /><label class="flabel">4-digit PIN</label><input class="fld" id="ivpin" inputmode="numeric" maxlength="4" placeholder="••••" /><button class="btn pri" id="ivgo">Save</button><button class="btn sub" id="ivcx" style="width:100%;margin-top:8px">Cancel</button><p class="note">Your PIN protects phone access. Choose 4 digits you can remember, and don’t reuse a bank card PIN.</p>');
    el.querySelector("#ivcx").addEventListener("click",close);
    el.querySelector("#ivgo").addEventListener("click",async()=>{ const phone=(el.querySelector("#ivp").value||"").trim(); const pin=(el.querySelector("#ivpin").value||"").replace(/\D/g,""); if(pin.length!==4){toast("Enter a 4-digit PIN.");return;} const g=el.querySelector("#ivgo"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("setIvr",{phone,pin}); if(r&&r.ok){ close(); toast("Phone banking is set up."); await refresh(); page="settings"; render(); } else { toast(r&&r.error?r.error:"Could not save."); g.disabled=false; g.textContent="Save"; } });
  }
  function openCharge(id,email){
    const {el,close}=sheet('<h3>Charge card</h3><p class="sub">'+email+'</p><label class="flabel">Amount of sale</label><input class="fld" id="amt" type="number" min="0" step="0.01" placeholder="0.00" /><button class="btn pri" id="go">Charge</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button>');
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#go").addEventListener("click",async()=>{ const amt=Math.round(parseFloat(el.querySelector("#amt").value)*100); if(!amt||amt<=0){toast("Enter a sale amount.");return;} const g=el.querySelector("#go"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("charge",{cardId:id,amount:amt}); if(r&&r.ok){ close(); toast("Charged "+fmt(amt)+"."); await refresh(); } else { toast(r&&r.error?r.error:"Charge failed."); g.disabled=false; g.textContent="Charge"; } });
  }

  function openIssue(){
    const {el,close}=sheet('<h3>Issue / load a card</h3><p class="sub">Create or top up a customer gift card.</p><label class="flabel">Customer email</label><input class="fld" id="iem" type="email" placeholder="customer@email.com" /><label class="flabel">Load amount</label><div class="seg" id="iq"><button data-q="25">$25</button><button data-q="50">$50</button><button data-q="100">$100</button><button data-q="200">$200</button></div><input class="fld" id="iamt" type="number" min="0" step="1" placeholder="Amount" /><button class="btn pri" id="igo">Issue card</button><button class="btn sub" id="icx" style="width:100%;margin-top:8px">Cancel</button>');
    el.querySelectorAll("#iq button").forEach(b=>b.addEventListener("click",()=>{el.querySelector("#iamt").value=b.getAttribute("data-q");el.querySelectorAll("#iq button").forEach(x=>x.classList.toggle("on",x===b));}));
    el.querySelector("#icx").addEventListener("click",close);
    el.querySelector("#igo").addEventListener("click",async()=>{ const email=(el.querySelector("#iem").value||"").trim(); const amt=Math.round(parseFloat(el.querySelector("#iamt").value||"0")*100); if(!/.+@.+\..+/.test(email)){toast("Enter a valid email.");return;} const g=el.querySelector("#igo"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("issueCard",{email,amount:amt}); if(r&&r.ok){ close(); toast("Card issued for "+email+" — balance "+fmt(r.balance)); await refresh(); } else { toast(r&&r.error?r.error:"Could not issue card."); g.disabled=false; g.textContent="Issue card"; } });
  }

  /* ---------- Merchant charge (by total amount) ---------- */
  async function doAmountCharge(){
    const sel=$("coCard"); const cardId=sel&&sel.value; if(!cardId){ toast("No customer selected."); return; }
    const amt=Math.round(parseFloat($("coAmt").value)*100); if(!amt||amt<=0){ toast("Enter a sale amount."); return; }
    const btn=$("coCharge"); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
    const r=await api("checkout",{cardId,amount:amt});
    if(r&&r.ok){
      selectedCard=null;
      let msg="Charged "+fmt(Math.round(r.total*100))+" · "+(r.pointsAwarded||0)+" pts earned";
      msg += r.posInvoice ? " · sale recorded in POS" : (r.posError ? " · POS not synced" : "");
      toast(msg); await refresh(); page="activity"; buildNav(); render();
    } else { toast(r&&r.error?r.error:"Charge failed."); btn.disabled=false; btn.textContent="Charge gift card"; }
  }

  boot();
</script>
</body>
</html>
