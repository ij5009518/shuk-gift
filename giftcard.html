<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b3b2e" />
<title>Shuk Gift — Wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#eef3f0; --bg2:#e6ede9;
    --surface:#ffffff; --surface2:#f4f8f6; --surface3:#eef3f0; --line:#e2eae6; --line2:#d6e1db;
    --ink:#0a1713; --muted:#5a6b64; --faint:#93a49c;
    --accent:#0e9f6e; --accent2:#0b855c; --accentdk:#0b3b2e;
    --mint:#e7f6ef; --mint2:#d7f0e4;
    --gold:#d9a93a; --danger:#d8453a; --dangerbg:#fcecea;
    --r:18px; --r2:14px;
    --sh-sm:0 1px 2px rgba(10,23,19,.05), 0 1px 3px rgba(10,23,19,.04);
    --sh:0 4px 14px -6px rgba(10,23,19,.12), 0 2px 6px -3px rgba(10,23,19,.08);
    --sh-lg:0 24px 60px -28px rgba(10,23,19,.4);
    --card1:#0a3527; --card2:#10543d; --card3:#1c7a57;
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --display:'Sora','Inter',-apple-system,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;color-scheme:light;}
  body{background:
    radial-gradient(900px 600px at 100% -10%, rgba(28,122,87,.10), transparent 60%),
    radial-gradient(800px 500px at -10% 110%, rgba(14,159,110,.08), transparent 55%),
    var(--bg);}
  button{font-family:inherit;cursor:pointer;} input,select{font-family:inherit;color-scheme:light;} svg{display:block;}
  ::selection{background:var(--mint2);}

  /* ---------- Auth gate ---------- */
  .auth{position:fixed;inset:0;display:grid;place-items:center;padding:24px;z-index:100;overflow:hidden;
    background:radial-gradient(130% 120% at 80% -10%,#1c7a57 0%,#0c3527 52%,#05201a 100%);}
  .auth::before{content:"";position:absolute;inset:0;background:
    radial-gradient(420px 420px at 18% 88%, rgba(63,211,154,.22), transparent 60%),
    radial-gradient(360px 360px at 92% 12%, rgba(217,169,58,.14), transparent 60%);pointer-events:none;}
  .authcard{position:relative;background:rgba(255,255,255,.98);border-radius:24px;padding:38px 32px;width:100%;max-width:400px;
    box-shadow:0 40px 90px -34px rgba(0,0,0,.65);text-align:center;border:1px solid rgba(255,255,255,.6);}
  .authcard .pitch{color:var(--muted);font-size:14.5px;margin:14px 0 22px;line-height:1.55;}
  .authcard .perks{display:flex;gap:8px;justify-content:center;margin:-4px 0 20px;flex-wrap:wrap;}
  .perk{font-size:11.5px;font-weight:700;color:var(--accent2);background:var(--mint);border:1px solid var(--mint2);padding:6px 10px;border-radius:999px;}
  #clerkSignIn{display:flex;justify-content:center;}

  .brand{display:inline-flex;align-items:center;gap:11px;font-family:var(--display);font-weight:800;font-size:21px;letter-spacing:-.4px;color:var(--ink);}
  .mark{width:34px;height:34px;border-radius:11px;background:linear-gradient(140deg,#15a06f,#0b3b2e);display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:800;font-size:17px;box-shadow:0 6px 16px -6px rgba(14,159,110,.7), inset 0 1px 0 rgba(255,255,255,.25);}

  /* ---------- Shell ---------- */
  .shell{display:none;min-height:100vh;min-height:100dvh;}
  aside{width:256px;flex:none;background:rgba(255,255,255,.86);backdrop-filter:blur(12px);border-right:1px solid var(--line);
    position:sticky;top:0;height:100vh;height:100dvh;display:flex;flex-direction:column;padding:20px 16px;}
  aside .brand{padding:6px 8px 4px;font-size:19px;}
  .rolepill{margin:14px 8px 14px;font-size:10.5px;font-weight:800;letter-spacing:.7px;color:var(--accent2);
    background:var(--mint);border:1px solid var(--mint2);padding:5px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;width:fit-content;}
  .rolepill::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(14,159,110,.18);}
  aside nav{display:flex;flex-direction:column;gap:2px;}
  aside nav button{display:flex;align-items:center;gap:12px;background:none;border:none;border-radius:12px;padding:11px 12px;font-size:14.5px;font-weight:600;color:var(--muted);text-align:left;position:relative;transition:background .14s,color .14s;}
  aside nav button svg{width:19px;height:19px;stroke:currentColor;flex:none;}
  aside nav button:hover{background:var(--surface2);color:var(--ink);}
  aside nav button.on{background:var(--mint);color:var(--accent2);font-weight:700;}
  aside nav button.on::before{content:"";position:absolute;left:-16px;top:11px;bottom:11px;width:3px;border-radius:0 3px 3px 0;background:var(--accent);}
  .spacer{flex:1;}
  .userchip{border-top:1px solid var(--line);padding-top:14px;}
  .userchip .who{display:flex;align-items:center;gap:11px;padding:4px 8px;}
  .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(140deg,#bfe6d4,#8fd6b6);display:grid;place-items:center;font-weight:800;font-size:14px;color:#0b3b2e;flex:none;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(11,59,46,.08);}
  .av img{width:100%;height:100%;object-fit:cover;}
  .userchip .nm{font-size:13.5px;font-weight:800;line-height:1.2;}
  .userchip .em{font-size:11.5px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
  .out{margin-top:10px;width:100%;display:flex;align-items:center;gap:9px;background:none;border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:13px;font-weight:700;color:var(--muted);transition:.14s;}
  .out:hover{background:var(--surface2);color:var(--ink);border-color:var(--line2);} .out svg{width:16px;height:16px;stroke:currentColor;}

  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  header.top{position:sticky;top:0;z-index:6;background:rgba(238,243,240,.78);backdrop-filter:saturate(140%) blur(14px);border-bottom:1px solid var(--line);padding:15px 34px;display:flex;align-items:center;gap:14px;}
  header.top .title{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:-.4px;}
  header.top .sub{font-size:12.5px;color:var(--muted);margin-top:1px;font-weight:500;}
  .grow{flex:1;}
  .secure{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600;background:var(--surface);border:1px solid var(--line);padding:7px 12px;border-radius:999px;box-shadow:var(--sh-sm);}
  .secure svg{width:14px;height:14px;stroke:var(--accent);}
  .scroll{padding:28px 34px 90px;width:100%;max-width:1120px;}
  .view{animation:fade .26s cubic-bezier(.2,.7,.3,1);} @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .grid2{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);gap:22px;align-items:start;}
  .secline{font-size:12px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--faint);margin:26px 2px 12px;}
  .secline:first-child{margin-top:0;}

  /* ---------- Gift card ---------- */
  .cardwrap{perspective:1400px;max-width:440px;}
  .gc{position:relative;border-radius:22px;padding:24px 24px 22px;color:#fff;overflow:hidden;aspect-ratio:1.586/1;
    background:
      radial-gradient(150% 130% at 88% -10%, #1f8a63 0%, var(--card2) 42%, var(--card1) 100%);
    box-shadow:var(--sh-lg), inset 0 1px 0 rgba(255,255,255,.10);
    transition:transform .18s cubic-bezier(.2,.7,.3,1), box-shadow .18s;transform-style:preserve-3d;}
  .gc::after{content:"";position:absolute;inset:0;border-radius:22px;pointer-events:none;
    background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,.16) 45%,transparent 60%);
    background-size:280% 280%;background-position:140% 0;transition:none;}
  .gc.shine::after{animation:shine 1.1s ease;}
  @keyframes shine{from{background-position:140% 0;}to{background-position:-40% 0;}}
  .gc .mesh{position:absolute;inset:0;pointer-events:none;opacity:.9;
    background:radial-gradient(120px 120px at 16% 86%, rgba(63,211,154,.35), transparent 60%),
               radial-gradient(160px 160px at 96% 8%, rgba(217,169,58,.18), transparent 60%);}
  .gc .grain{position:absolute;inset:0;pointer-events:none;opacity:.5;mix-blend-mode:overlay;
    background-image:radial-gradient(rgba(255,255,255,.18) 1px, transparent 1px);background-size:7px 7px;}
  .gc>*{position:relative;}
  .gc .r1{display:flex;justify-content:space-between;align-items:flex-start;}
  .gc .r1 .nm{font-family:var(--display);font-weight:800;font-size:16px;letter-spacing:.2px;display:flex;align-items:center;gap:8px;}
  .gc .r1 .nm .dot{width:22px;height:22px;border-radius:7px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:12px;font-weight:800;backdrop-filter:blur(3px);}
  .gc .wifi{opacity:.85;}
  .gc .chip{width:42px;height:31px;border-radius:7px;margin-top:18px;
    background:linear-gradient(135deg,#f4dd9a,#d6b35f 55%,#b8923f);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);position:relative;}
  .gc .chip::before{content:"";position:absolute;inset:6px 8px;border:1px solid rgba(120,80,20,.45);border-radius:3px;}
  .gc .chip::after{content:"";position:absolute;left:50%;top:5px;bottom:5px;width:1px;background:rgba(120,80,20,.45);}
  .gc .lbl{margin-top:16px;font-size:11px;opacity:.75;letter-spacing:.4px;text-transform:uppercase;font-weight:700;}
  .gc .bal{font-family:var(--display);font-size:36px;font-weight:800;letter-spacing:-1px;margin-top:1px;line-height:1;}
  .gc .num{margin-top:16px;font-size:16.5px;letter-spacing:3px;font-variant-numeric:tabular-nums;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.25);}
  .gc .foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:14px;font-size:11px;opacity:.82;letter-spacing:.6px;font-weight:600;}
  .gc .foot .vlabel{font-size:8.5px;opacity:.7;letter-spacing:1px;}
  .gc.rewards{background:radial-gradient(150% 130% at 88% -10%, #2f9e72 0%, #14694a 42%, #0a3527 100%);}

  .actions{display:grid;grid-template-columns:1fr 1fr;gap:11px;max-width:440px;margin-top:13px;}
  .act{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;align-items:center;gap:11px;color:var(--ink);font-weight:700;font-size:14px;box-shadow:var(--sh-sm);transition:.14s;}
  .act:hover{transform:translateY(-1px);box-shadow:var(--sh);border-color:var(--line2);}
  .act .ic{width:36px;height:36px;border-radius:10px;background:var(--mint);display:grid;place-items:center;flex:none;} .act .ic svg{width:18px;height:18px;stroke:var(--accent);}

  /* ---------- Blocks / stats ---------- */
  .block{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--sh-sm);}
  .block h3{margin:0 0 14px;font-size:14px;font-weight:800;letter-spacing:-.2px;display:flex;align-items:center;gap:8px;}
  .block .h3sub{font-size:12px;color:var(--muted);font-weight:500;margin-left:auto;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;}
  .stat .k{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px;} .stat .k svg{width:14px;height:14px;stroke:var(--accent);}
  .stat .v{font-family:var(--display);font-size:27px;font-weight:800;letter-spacing:-.6px;margin-top:7px;} .stat.green .v{color:var(--accent2);}
  .list{display:flex;flex-direction:column;}
  .row{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--surface2);flex:none;border:1px solid var(--line);} .row .ic svg{width:16px;height:16px;}
  .row .nm{font-size:14px;font-weight:700;} .row .dt{font-size:12px;color:var(--muted);margin-top:1px;}
  .row .amt{margin-left:auto;font-weight:800;font-size:14px;font-variant-numeric:tabular-nums;} .amt.pos{color:var(--accent2);} .amt.neg{color:var(--ink);}
  .row .go{margin-left:auto;background:var(--mint);color:var(--accent2);border:1px solid var(--mint2);border-radius:10px;padding:8px 13px;font-weight:800;font-size:13px;transition:.14s;}
  .row .go:hover{background:var(--mint2);}
  .empty{color:var(--faint);font-size:13px;padding:18px 2px;text-align:center;}
  .badge{font-size:11.5px;font-weight:800;padding:5px 11px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;}

  .flabel{font-size:12.5px;font-weight:700;color:#33433c;display:block;margin-top:10px;}
  .fld{width:100%;padding:12px 13px;border:1px solid var(--line2);border-radius:12px;font-size:14px;margin:6px 0 4px;background:var(--surface);color:var(--ink);transition:.14s;}
  .fld:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,159,110,.14);}
  .btn{border:none;border-radius:12px;padding:13px 18px;font-weight:800;font-size:14px;transition:.14s;}
  .btn.pri{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;width:100%;box-shadow:0 8px 20px -10px rgba(14,159,110,.8);}
  .btn.pri:hover{filter:brightness(1.04);transform:translateY(-1px);} .btn.pri:active{transform:none;}
  .btn.sub{background:var(--surface);color:var(--ink);border:1px solid var(--line2);}
  .btn.sub:hover{background:var(--surface2);}
  .btn.ghost{background:none;color:var(--danger);border:1px solid var(--dangerbg);}
  .btn.ghost:hover{background:var(--dangerbg);}
  .note{font-size:11.5px;color:var(--muted);line-height:1.65;margin-top:12px;}
  .codebox{font-size:25px;font-weight:800;letter-spacing:5px;text-align:center;background:var(--surface2);border:1px dashed var(--line2);border-radius:14px;padding:20px;margin-top:8px;font-variant-numeric:tabular-nums;color:var(--ink);}
  .seg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:8px 0 10px;}
  .seg button{border:1px solid var(--line2);background:var(--surface);border-radius:11px;padding:11px 0;font-weight:700;font-size:14px;color:var(--ink);transition:.12s;} .seg button.on{border-color:var(--accent);background:var(--mint);color:var(--accent2);}
  .seg button:hover{border-color:var(--accent);}

  /* progress */
  .prog{height:9px;border-radius:999px;background:var(--surface3);overflow:hidden;margin:10px 0 6px;}
  .prog>span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),#3fd39a);transition:width .5s cubic-bezier(.2,.7,.3,1);}

  /* bank rows */
  .bankrow{display:flex;align-items:center;gap:13px;padding:14px;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;background:var(--surface);transition:.14s;}
  .bankrow:hover{border-color:var(--line2);box-shadow:var(--sh-sm);}
  .bankrow .bk{width:44px;height:44px;border-radius:12px;background:linear-gradient(140deg,#0f5d44,#0a3527);display:grid;place-items:center;flex:none;}
  .bankrow .bk svg{width:20px;height:20px;stroke:#fff;}
  .bankrow .nm{font-size:14.5px;font-weight:800;}
  .bankrow .dt{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:8px;}
  .ftag{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:capitalize;color:var(--accent2);background:var(--mint);border:1px solid var(--mint2);padding:2px 8px;border-radius:999px;}
  .iconbtn{margin-left:auto;background:none;border:1px solid var(--line);border-radius:10px;width:38px;height:38px;display:grid;place-items:center;color:var(--muted);transition:.14s;flex:none;}
  .iconbtn:hover{color:var(--danger);border-color:var(--dangerbg);background:var(--dangerbg);} .iconbtn svg{width:16px;height:16px;stroke:currentColor;}

  /* ---------- Sheets / toast ---------- */
  .backdrop{position:fixed;inset:0;background:rgba(8,18,14,.5);backdrop-filter:blur(3px);display:none;z-index:50;animation:fade .18s ease;}
  .sheet{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(430px,92vw);background:var(--surface);border-radius:22px;padding:26px;box-shadow:var(--sh-lg);z-index:51;display:none;animation:pop .22s cubic-bezier(.2,.8,.3,1);}
  @keyframes pop{from{opacity:0;transform:translate(-50%,-46%) scale(.97);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}
  .sheet h3{margin:0 0 4px;font-family:var(--display);font-size:19px;font-weight:800;} .sheet .sub{color:var(--muted);font-size:13px;margin:0 0 16px;line-height:1.5;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);background:var(--ink);color:#fff;padding:13px 20px;border-radius:14px;font-size:13.5px;font-weight:600;max-width:440px;box-shadow:var(--sh-lg);display:none;z-index:60;text-align:center;opacity:0;transition:opacity .2s,transform .2s;}
  .toast.show{display:block;opacity:1;transform:translateX(-50%) translateY(0);}
  .toast b{color:#7ef0bf;}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px;} @keyframes sp{to{transform:rotate(360deg);}}

  .mobnav{display:none;}
  @media(max-width:860px){
    aside{display:none;} header.top,.scroll{padding-left:16px;padding-right:16px;} .grid2{grid-template-columns:1fr;} .stats{grid-template-columns:1fr 1fr;} .scroll{padding-bottom:100px;}
    header.top{padding-top:14px;padding-bottom:14px;}
    .mobnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(14px);border-top:1px solid var(--line);padding:9px 4px calc(12px + env(safe-area-inset-bottom));z-index:30;}
    .mobnav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--faint);padding:4px 0;} .mobnav button svg{width:22px;height:22px;stroke:currentColor;} .mobnav button.on{color:var(--accent2);}
  }
</style>
</head>
<body>

<!-- AUTH -->
<div class="auth" id="auth" style="display:none">
  <div class="authcard">
    <div class="brand"><span class="mark">S</span><span>Shuk&nbsp;Gift</span></div>
    <p class="pitch">Your store credit, rewards and linked banks — all in one beautiful wallet.</p>
    <div class="perks"><span class="perk">⚡ Instant rewards</span><span class="perk">🔒 Bank-grade security</span><span class="perk">🎁 Welcome bonus</span></div>
    <div id="clerkSignIn"></div>
  </div>
</div>

<!-- APP -->
<div class="shell" id="shell">
  <aside>
    <div class="brand"><span class="mark">S</span><span>Shuk&nbsp;Gift</span></div>
    <span class="rolepill" id="rolePill">—</span>
    <nav id="nav"></nav>
    <div class="spacer"></div>
    <div class="userchip">
      <div class="who"><div class="av" id="avatar">·</div><div style="min-width:0"><div class="nm" id="sideName">—</div><div class="em" id="sideEmail">—</div></div></div>
      <button class="out" id="signout"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sign out</button>
    </div>
  </aside>
  <div class="main">
    <header class="top">
      <div><div class="title" id="pageTitle">Home</div><div class="sub" id="pageSub"></div></div>
      <span class="grow"></span>
      <span class="secure"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>Secured</span>
    </header>
    <div class="scroll" id="scroll"></div>
    <div class="mobnav" id="mobnav"></div>
  </div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="toast" id="toast"></div>

<script>
  const $=id=>document.getElementById(id);
  const fmt=c=>"$"+((c||0)/100).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  const nf=n=>(n||0).toLocaleString("en-US");
  const fmtCard=n=>n?String(n).replace(/(.{4})(?=.)/g,"$1 "):"•••• •••• •••• ••••";
  const prog=()=>(ME&&ME.program)||{};
  const brand=()=>prog().programName||"Shuk Gift";
  const store=()=>prog().storeName||"Shuk";

    return r.json();
  }

  /* ---------- Clerk ---------- */
  async function boot(){
    let cfg={}; try{ cfg=await (await fetch("/api/config")).json(); }catch(e){}

    else { $("auth").style.display="grid"; $("clerkSignIn").innerHTML='<p style="color:#b91c1c;font-size:13px">Sign-in isn’t configured yet.</p>'; }
  }
  function loadClerk(pk){
    const s=document.createElement("script");
    s.setAttribute("data-clerk-publishable-key",pk);
    s.src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js";
    s.async=true; s.crossOrigin="anonymous";
    s.onload=async()=>{ try{ await Clerk.load(); clerkActive=true; Clerk.addListener(()=>gate()); gate(); }catch(e){ $("auth").style.display="grid"; } };
    document.head.appendChild(s);
  }
  async function gate(){
    if(window.Clerk&&Clerk.user){
      $("auth").style.display="none";
      await refresh();
      $("shell").style.display="flex";
    } else {
      $("shell").style.display="none"; $("auth").style.display="grid";
      const c=$("clerkSignIn"); if(!c._m){ c._m=true; try{ Clerk.mountSignIn(c); }catch(e){} }

  }

  }

  /* card 3D tilt + shine */
  function wireCard(el){
    if(!el) return;
    el.parentElement&&el.parentElement.addEventListener("mousemove",e=>{
      const r=el.getBoundingClientRect(), x=(e.clientX-r.left)/r.width-.5, y=(e.clientY-r.top)/r.height-.5;
      el.style.transform="rotateY("+(x*7).toFixed(2)+"deg) rotateX("+(-y*7).toFixed(2)+"deg) translateY(-2px)";
    });
    el.parentElement&&el.parentElement.addEventListener("mouseleave",()=>{ el.style.transform=""; });
    setTimeout(()=>{ el.classList.add("shine"); setTimeout(()=>el.classList.remove("shine"),1200); },220);
  }

  function autoDesc(a){

  function openAutoReload(banks){
    if(!banks||!banks.length){ openLinkBank(()=>{ page="wallet"; render(); }); toast("Link a bank first to enable auto top-up."); return; }
    const a=(ME&&ME.autoReload)||{enabled:false,mode:"low",amountCents:5000,thresholdCents:5000};
    const amt=((a.amountCents||5000)/100), thr=((a.thresholdCents||5000)/100), mode=a.mode||"low";
    const {el,close}=sheet(
      '<h3>Auto top-up</h3><p class="sub">Automatically reload your card from your linked bank so you never run out of store credit.</p>'+
      '<div style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:12px"><div style="flex:1"><div style="font-weight:800;font-size:14px">Enable auto top-up</div><div class="note" style="margin:0">Turn the whole feature on or off.</div></div><input type="checkbox" id="aEn" '+(a.enabled?"checked":"")+' style="width:22px;height:22px;accent-color:#0e9f6e"></div>'+
      '<label class="flabel">When should we reload?</label><div class="seg" id="aMode" style="grid-template-columns:repeat(3,1fr)"><button data-m="low" class="'+(mode==="low"?"on":"")+'">Low balance</button><button data-m="weekly" class="'+(mode==="weekly"?"on":"")+'">Weekly</button><button data-m="monthly" class="'+(mode==="monthly"?"on":"")+'">Monthly</button></div>'+
      '<div id="aThrWrap"><label class="flabel">Reload when balance drops below</label><div class="seg" id="aThrQ"><button data-q="25">$25</button><button data-q="40">$40</button><button data-q="50">$50</button><button data-q="75">$75</button></div><input class="fld" id="aThr" type="number" min="1" step="1" value="'+thr+'" /></div>'+
      '<label class="flabel">Amount to reload each time</label><div class="seg" id="aAmtQ"><button data-q="25">$25</button><button data-q="50">$50</button><button data-q="100">$100</button><button data-q="200">$200</button></div><input class="fld" id="aAmt" type="number" min="1" step="1" value="'+amt+'" />'+
      '<div class="block" id="aPrev" style="background:var(--mint);border:1px solid var(--mint2);margin:6px 0 12px;font-size:13px;color:var(--accent2);font-weight:700"></div>'+
      '<button class="btn pri" id="aSave">Save auto top-up</button>'+
      (a.enabled?'<button class="btn ghost" id="aOff" style="width:100%;margin-top:8px">Turn off auto top-up</button>':'')+
      '<button class="btn sub" id="aCx" style="width:100%;margin-top:8px">Cancel</button>'+
      '<p class="note">From your bank •••• '+esc((banks[0]&&banks[0].last4)||"")+' by ACH. Max $2,000 per reload. You can change or cancel anytime.</p>');
    let curMode=mode;
    const syncMode=()=>{ el.querySelector("#aThrWrap").style.display=curMode==="low"?"block":"none"; prev(); };
    const prev=()=>{ const A=fmt(Math.round((parseFloat(el.querySelector("#aAmt").value)||0)*100)); let t; if(curMode==="low"){ t="Reload "+A+" whenever balance drops below "+fmt(Math.round((parseFloat(el.querySelector("#aThr").value)||0)*100)); } else { t="Reload "+A+" automatically every "+(curMode==="weekly"?"week":"month"); } el.querySelector("#aPrev").textContent=t+"."; };
    el.querySelectorAll("#aMode button").forEach(b=>b.addEventListener("click",()=>{ curMode=b.getAttribute("data-m"); el.querySelectorAll("#aMode button").forEach(x=>x.classList.toggle("on",x===b)); syncMode(); }));
    el.querySelectorAll("#aThrQ button").forEach(b=>b.addEventListener("click",()=>{ el.querySelector("#aThr").value=b.getAttribute("data-q"); prev(); }));
    el.querySelectorAll("#aAmtQ button").forEach(b=>b.addEventListener("click",()=>{ el.querySelector("#aAmt").value=b.getAttribute("data-q"); prev(); }));
    el.querySelector("#aThr").addEventListener("input",prev); el.querySelector("#aAmt").addEventListener("input",prev);
    el.querySelector("#aCx").addEventListener("click",close);
    syncMode();
    const save=async(enabled)=>{
      const amountCents=Math.round((parseFloat(el.querySelector("#aAmt").value)||0)*100);
      const thresholdCents=Math.round((parseFloat(el.querySelector("#aThr").value)||0)*100);
      if(enabled){ if(amountCents<=0){ toast("Enter a reload amount."); return; } if(amountCents>200000){ toast("Max $2,000 per reload."); return; } if(curMode==="low"&&thresholdCents<=0){ toast("Enter a low-balance threshold."); return; } }
      const g=el.querySelector(enabled?"#aSave":"#aOff"); g.disabled=true; g.innerHTML='<span class="spin"></span>';
      const r=await api("setAutoReload",{enabled,mode:curMode,amountCents,thresholdCents});
      if(r&&r.ok){ ME.autoReload=r.autoReload; close(); toast(enabled?"Auto top-up saved.":"Auto top-up turned off."); render(); }
      else { toast(r&&r.error?r.error:"Could not save."); g.disabled=false; g.textContent=enabled?"Save auto top-up":"Turn off auto top-up"; }
    };
    el.querySelector("#aSave").addEventListener("click",()=>save(el.querySelector("#aEn").checked));
    var off=el.querySelector("#aOff"); if(off) off.addEventListener("click",()=>save(false));
  }

    ["pRew","pFlb","pCap","pFmin"].forEach(id=>$(id).addEventListener("input",preview)); preview();
    $("pSave").addEventListener("click",async()=>{
      const program={ storeName:$("pStore").value, programName:$("pProg").value, rewardsPercent:parseFloat($("pRew").value)||0, redeemMinPoints:parseInt($("pMin").value)||100, firstLoadBonusPercent:parseFloat($("pFlb").value)||0, firstLoadBonusCapCents:Math.round((parseFloat($("pCap").value)||0)*100), firstLoadMinCents:Math.round((parseFloat($("pFmin").value)||0)*100), signupBonusPoints:parseInt($("pSignup").value)||0 };
      const g=$("pSave"); g.disabled=true; g.innerHTML='<span class="spin"></span>';
      const r=await api("setProgram",{program});
      if(r&&r.ok){ ME.program=r.program; toast("Settings saved."); render(); } else { toast(r&&r.error?r.error:"Could not save."); g.disabled=false; g.textContent="Save settings"; }
    });
  }

  /* ---------- Sheets ---------- */
  function sheet(html){ const w=document.createElement("div"); w.className="sheet"; w.style.display="block"; w.innerHTML=html; document.body.appendChild(w); $("backdrop").style.display="block"; const close=()=>{w.remove();$("backdrop").style.display="none";}; $("backdrop").onclick=close; return {el:w,close}; }
  async function openAdd(){
    const st=await api("bankStatus");
    if(!st||!st.linked){ openLinkBank(()=>openAdd()); return; }
    const {el,close}=sheet('<h3>Add funds</h3><p class="sub">Transfer from your linked bank •••• '+esc(st.last4||"")+' by ACH.</p><div class="seg" id="q"><button data-q="25">$25</button><button data-q="50">$50</button><button data-q="100">$100</button><button data-q="200">$200</button></div><input class="fld" id="amt" type="number" min="1" step="1" placeholder="Or enter amount" /><button class="btn pri" id="go" style="margin-top:10px">Transfer to my card</button><button class="btn sub" id="relink" style="width:100%;margin-top:8px">Use a different bank</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button><p class="note">Funds are pulled from your bank by ACH and added to your store credit. Bank transfers normally take 1–3 business days to settle.</p>');
    el.querySelectorAll("#q button").forEach(b=>b.addEventListener("click",()=>{el.querySelector("#amt").value=b.getAttribute("data-q");el.querySelectorAll("#q button").forEach(x=>x.classList.toggle("on",x===b));}));
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#relink").addEventListener("click",()=>{ close(); openLinkBank(()=>openAdd()); });
    el.querySelector("#go").addEventListener("click",async()=>{ const amt=Math.round(parseFloat(el.querySelector("#amt").value)*100); if(!amt||amt<=0){toast("Enter an amount.");return;} if(amt>200000){toast("Max $2,000 per transfer.");return;} const g=el.querySelector("#go"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("addFundsAch",{amount:amt}); if(r&&r.ok){ close(); let m=r.settled?("Added <b>"+fmt(amt)+"</b> to your card."):("Transfer of "+fmt(amt)+" started — arrives when it settles."); if(r.bonus>0) m+=" Welcome bonus +"+fmt(r.bonus)+"!"; toast(m); await refresh(); page="home"; buildNav(); render(); } else { toast(r&&r.error?r.error:"Could not start transfer."); g.disabled=false; g.textContent="Transfer to my card"; } });
  }
  function openLinkBank(after){
    const {el,close}=sheet('<h3>Link your bank</h3><p class="sub">Add a bank account to load funds by ACH.</p><label class="flabel">Routing number</label><input class="fld" id="rt" inputmode="numeric" placeholder="9 digits" /><label class="flabel">Account number</label><input class="fld" id="an" inputmode="numeric" placeholder="Account number" /><label class="flabel">Account type</label><select class="fld" id="ft"><option value="checking">Checking</option><option value="savings">Savings</option></select><button class="btn pri" id="lk" style="margin-top:12px">Link bank</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button><p class="note">🔒 Your bank details are sent securely to our banking partner to enable ACH transfers, and are not stored in the app.</p>');
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#lk").addEventListener("click",async()=>{ const routingNumber=(el.querySelector("#rt").value||"").trim(); const accountNumber=(el.querySelector("#an").value||"").trim(); const funding=el.querySelector("#ft").value; if(routingNumber.replace(/\D/g,"").length!==9){toast("Enter a valid 9-digit routing number.");return;} if(accountNumber.replace(/\D/g,"").length<4){toast("Enter a valid account number.");return;} const g=el.querySelector("#lk"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("linkBank",{routingNumber,accountNumber,funding}); if(r&&r.ok){ close(); toast("Bank linked •••• "+(r.last4||"")); if(typeof after==="function") after(); } else { toast(r&&r.error?r.error:"Could not link bank."); g.disabled=false; g.textContent="Link bank"; } });
  }
  function openPay(){
    const {el,close}=sheet('<h3>Pay in store</h3><p class="sub">Show this card number at the register to pay with your store credit.</p><div class="codebox" style="letter-spacing:2px;font-size:21px">'+fmtCard(ME.cardNumber)+'</div><p class="note" style="text-align:center;font-size:13px;margin-top:10px">Available balance <b style="color:var(--accent2)">'+fmt(ME.balance)+'</b></p><button class="btn sub" id="cx" style="width:100%;margin-top:10px">Done</button>');
    el.querySelector("#cx").addEventListener("click",close);
  }
  function openIvr(){
    const {el,close}=sheet('<h3>Phone &amp; text banking</h3><p class="sub">Register your mobile number and a 4-digit PIN. You can then call or text to hear your balance and add money.</p><label class="flabel">Mobile number</label><input class="fld" id="ivp" inputmode="tel" placeholder="(555) 555-5555" value="'+esc(ME.phone||"")+'" /><label class="flabel">4-digit PIN</label><input class="fld" id="ivpin" inputmode="numeric" maxlength="4" placeholder="••••" /><button class="btn pri" id="ivgo" style="margin-top:10px">Save</button><button class="btn sub" id="ivcx" style="width:100%;margin-top:8px">Cancel</button><p class="note">Your PIN protects phone access. Choose 4 digits you can remember, and don’t reuse a bank card PIN.</p>');
    el.querySelector("#ivcx").addEventListener("click",close);
    el.querySelector("#ivgo").addEventListener("click",async()=>{ const phone=(el.querySelector("#ivp").value||"").trim(); const pin=(el.querySelector("#ivpin").value||"").replace(/\D/g,""); if(pin.length!==4){toast("Enter a 4-digit PIN.");return;} const g=el.querySelector("#ivgo"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("setIvr",{phone,pin}); if(r&&r.ok){ close(); toast("Phone banking is set up."); await refresh(); page="settings"; render(); } else { toast(r&&r.error?r.error:"Could not save."); g.disabled=false; g.textContent="Save"; } });
  }
  function openCharge(id,email){
    const {el,close}=sheet('<h3>Charge card</h3><p class="sub">'+esc(email)+'</p><label class="flabel">Amount of sale</label><input class="fld" id="amt" type="number" min="0" step="0.01" placeholder="0.00" /><button class="btn pri" id="go" style="margin-top:10px">Charge</button><button class="btn sub" id="cx" style="width:100%;margin-top:8px">Cancel</button>');
    el.querySelector("#cx").addEventListener("click",close);
    el.querySelector("#go").addEventListener("click",async()=>{ const amt=Math.round(parseFloat(el.querySelector("#amt").value)*100); if(!amt||amt<=0){toast("Enter a sale amount.");return;} const g=el.querySelector("#go"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("charge",{cardId:id,amount:amt}); if(r&&r.ok){ close(); toast("Charged "+fmt(amt)+"."); await refresh(); } else { toast(r&&r.error?r.error:"Charge failed."); g.disabled=false; g.textContent="Charge"; } });
  }

  function openIssue(){
    const {el,close}=sheet('<h3>Issue / load a card</h3><p class="sub">Create or top up a customer gift card.</p><label class="flabel">Customer email</label><input class="fld" id="iem" type="email" placeholder="customer@email.com" /><label class="flabel">Load amount</label><div class="seg" id="iq"><button data-q="25">$25</button><button data-q="50">$50</button><button data-q="100">$100</button><button data-q="200">$200</button></div><input class="fld" id="iamt" type="number" min="0" step="1" placeholder="Amount" /><button class="btn pri" id="igo" style="margin-top:10px">Issue card</button><button class="btn sub" id="icx" style="width:100%;margin-top:8px">Cancel</button>');
    el.querySelectorAll("#iq button").forEach(b=>b.addEventListener("click",()=>{el.querySelector("#iamt").value=b.getAttribute("data-q");el.querySelectorAll("#iq button").forEach(x=>x.classList.toggle("on",x===b));}));
    el.querySelector("#icx").addEventListener("click",close);
    el.querySelector("#igo").addEventListener("click",async()=>{ const email=(el.querySelector("#iem").value||"").trim(); const amt=Math.round(parseFloat(el.querySelector("#iamt").value||"0")*100); if(!/.+@.+\..+/.test(email)){toast("Enter a valid email.");return;} const g=el.querySelector("#igo"); g.disabled=true; g.innerHTML='<span class="spin"></span>'; const r=await api("issueCard",{email,amount:amt}); if(r&&r.ok){ close(); toast("Card issued for "+esc(email)+" — balance "+fmt(r.balance)); await refresh(); } else { toast(r&&r.error?r.error:"Could not issue card."); g.disabled=false; g.textContent="Issue card"; } });
  }

  /* ---------- Merchant charge (by total amount) ---------- */
  async function doAmountCharge(){
    const sel=$("coCard"); const cardId=sel&&sel.value; if(!cardId){ toast("No customer selected."); return; }
    const amt=Math.round(parseFloat($("coAmt").value)*100); if(!amt||amt<=0){ toast("Enter a sale amount."); return; }
    const btn=$("coCharge"); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
    const r=await api("checkout",{cardId,amount:amt});
    if(r&&r.ok){
      selectedCard=null;
      let msg="Charged "+fmt(Math.round(r.total*100))+" · "+(r.pointsAwarded||0)+" pts earned";
      msg += r.posInvoice ? " · sale recorded in POS" : (r.posError ? " · POS not synced" : "");
      toast(msg); await refresh(); page="activity"; buildNav(); render();
    } else { toast(r&&r.error?r.error:"Charge failed."); btn.disabled=false; btn.textContent="Charge gift card"; }
  }

  boot();
</script>
</body>
</html>
